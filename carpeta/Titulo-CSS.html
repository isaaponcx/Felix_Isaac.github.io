<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Titulos con CSS</title>
    <style>
         body{background-color:#FFEFD5;}
        h1 {
            color: #1a1a1a;
            font-size: 2.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

    
        h2 {
            font-size: 1.8rem;
            color: #D2691E;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        h3 {
            font-size: 1.5rem;
            color: #4682B4;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        h4 {
            font-size: 1.2rem;
            color: #ADFF2F;
            margin-top: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h5 {
            font-size: 1rem;
            color: #FF1493;
            margin-top: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #FF0000;
        }
    </style>
</head>
<body>
        <h1>Título Principal</h1>
        <h2>Subtítulo grande</h2>
        <h3>Subtítulo mediano</h3>
        <h4>Subtítulo Pequeño </h4>
        <h5>Subtítulo Mini</h5>
        
        <p>parrafo coloridolololol</p>


</body>
</html>
